<style>
:root{--bg0:#080c10;--bg1:#0d1117;--bg2:#161b22;--bg3:#1f2937;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--accent:#58a6ff;--accent2:#1f6feb;--green:#3fb950;--red:#f85149;--amber:#d29922;--purple:#a371f7;--font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-d);background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(88,166,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(88,166,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 24px}
.topbar-inner{max-width:1280px;margin:0 auto;width:100%;display:flex;align-items:center;gap:12px;height:52px}
.logo-mark{width:28px;height:28px;background:var(--accent2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.logo-text{font-size:14px;font-weight:700;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);font-family:var(--font-m)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite;margin-left:auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.lastupd{font-family:var(--font-m);font-size:11px;color:var(--text3)}
.container{max-width:1280px;margin:0 auto;padding:0 24px 48px;position:relative;z-index:1}
.nav-wrap{padding:20px 0 0;margin-bottom:20px}
.nav-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);padding-bottom:0}
.nav-tab{padding:9px 20px;font-size:13px;font-weight:600;font-family:var(--font-d);border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:0.03em;transition:all 0.15s}
.nav-tab:hover:not(.on){color:var(--text2)}
.nav-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.sec-head{display:flex;align-items:baseline;gap:12px;margin:28px 0 14px}
.sec-head:first-child{margin-top:0}
.sec-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2)}
.sec-rule{flex:1;height:1px;background:var(--line)}
.sec-meta{font-family:var(--font-m);font-size:10px;color:var(--text3)}
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),transparent)}
.slb{font-family:var(--font-m);font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.sv{font-size:24px;font-weight:800;line-height:1;margin-bottom:4px}
.ssub{font-family:var(--font-m);font-size:11px;color:var(--text3)}
.note-box{background:rgba(88,166,255,0.05);border:1px solid rgba(88,166,255,0.15);border-radius:var(--r);padding:10px 14px;font-family:var(--font-m);font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.note-box strong{color:var(--accent)}
.upt-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:20px}
.upt-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rl);padding:16px;transition:border-color 0.2s}
.upt-card:hover{border-color:var(--line2)}
.upt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.upt-name{font-size:12px;font-weight:700;letter-spacing:0.06em;color:var(--text2)}
.upt-pct{font-size:22px;font-weight:800}
.upt-bar-bg{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:10px;overflow:hidden}
.upt-bar-f{height:100%;border-radius:2px}
.upt-stats{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.upt-stat{font-family:var(--font-m);font-size:10px;color:var(--text3)}
.upt-stat span{color:var(--text2)}
.panels-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:20px}
.gpanel{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rl);padding:14px 16px}
.gpanel-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.gpanel-badge{font-family:var(--font-m);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
.gpanel-label{font-size:11px;color:var(--text3);flex:1}
.gpanel-pct{font-family:var(--font-m);font-size:12px;font-weight:500}
.cat-row{margin-bottom:10px}
.cat-top{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.cat-name{font-size:11px;color:var(--text2);flex:1;line-height:1.3}
.cat-nums{font-family:var(--font-m);font-size:10px;white-space:nowrap}
.cat-pct{font-family:var(--font-m);font-size:10px;font-weight:500;min-width:32px;text-align:right}
.cat-bar-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.cat-bar-f{height:100%;border-radius:3px}
.delta-tag{font-size:9px;margin-left:3px;font-family:var(--font-m)}
.upt-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.utab{padding:6px 14px;font-size:12px;font-weight:600;letter-spacing:0.04em;border:1px solid var(--line2);border-radius:6px;background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font-d);transition:all 0.15s}
.utab.on{background:var(--accent2);border-color:var(--accent);color:#fff}
.utab:hover:not(.on){color:var(--text2);background:var(--bg2)}
.leg-row{display:flex;flex-wrap:wrap;gap:14px;font-family:var(--font-m);font-size:10px;color:var(--text3);margin-bottom:10px}
.leg-sq{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px}
/* Per-category charts grid */
.charts-section{margin-bottom:24px}
.charts-section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.charts-grp-badge{font-family:var(--font-m);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
.cat-charts-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.cat-chart-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rl);padding:12px 14px}
.cat-chart-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.cat-chart-name{font-size:10px;font-weight:600;font-family:var(--font-m)}
.cat-chart-pct{font-size:11px;font-weight:700;font-family:var(--font-m)}
.cat-chart-wrap{position:relative;width:100%;height:110px}
.cat-chart-foot{display:flex;justify-content:space-between;margin-top:5px;font-family:var(--font-m);font-size:9px;color:var(--text3)}
/* Rekap detail charts */
.detail-chart-block{margin-bottom:20px}
.detail-chart-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.grp-badge{font-family:var(--font-m);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
.chart-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rl);padding:14px}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.chart-legend-item{display:flex;align-items:center;gap:4px;font-family:var(--font-m);font-size:10px;color:var(--text2)}
.legend-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.mini-prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.mini-prog-name{font-size:10px;color:var(--text2);margin-bottom:2px;font-family:var(--font-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.footer{text-align:center;padding:20px 0 8px;border-top:1px solid var(--line);font-family:var(--font-m);font-size:10px;color:var(--text3);line-height:1.8}
@media(max-width:900px){.stat-row{grid-template-columns:repeat(2,1fr)}.upt-grid{grid-template-columns:repeat(2,1fr)}.panels-grid{grid-template-columns:1fr}.cat-charts-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.stat-row{grid-template-columns:1fr 1fr}.upt-grid{grid-template-columns:1fr}.cat-charts-grid{grid-template-columns:1fr}.container{padding:0 12px 40px}}
</style>
</head>

      "P1 AHI Proteksi":    [{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5},{t:5,o:5}],
      "P1 Design Proteksi": [{t:45,o:44},{t:45,o:44},{t:45,o:44},{t:45,o:44},{t:45,o:43},{t:45,o:43},{t:45,o:43},{t:45,o:43},{t:45,o:43},{t:45,o:43},{t:45,o:43},{t:45,o:43},{t:45,o:43},{t:45,o:43}],
      "P2 AHI Catu Daya":   [{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2}],
      "P2 Design Catu Daya":[{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2},{t:2,o:2}],
    },
  },
}

const ROW_KEYS = ["T2 ROW B1"];
const ROW_DIVISOR = 100;
const UPTS = ["MALANG","SURABAYA","GRESIK","BALI","MADIUN","PROBOLINGGO"];
const UPT_COLORS = {MALANG:'#58a6ff',SURABAYA:'#3fb950',GRESIK:'#f85149',BALI:'#d29922',MADIUN:'#a371f7',PROBOLINGGO:'#f0883e'};
const CAT_COLORS = ['#58a6ff','#3fb950','#f85149','#d29922','#a371f7','#f0883e','#39d353','#ff7b72'];
const GROUP_META = {
  G:{label:"G – Gardu Induk",badge_bg:"rgba(88,166,255,0.12)",badge_txt:"#58a6ff",bar:"#58a6ff"},
  T:{label:"T – Transmisi",badge_bg:"rgba(248,81,73,0.12)",badge_txt:"#f85149",bar:"#f85149"},
  P:{label:"P – Proteksi & Catu Daya",badge_bg:"rgba(63,185,80,0.12)",badge_txt:"#3fb950",bar:"#3fb950"},
};

let activeView = 'rekap';
let activeUpt = 'GRESIK';
let _rekapCharts = [];
let _uptCharts = [];

function pct(o,t){return !t?100:Math.round((1-o/t)*100)}
function oColor(o,t){return !t?'#484f58':o===0?'#3fb950':o===t?'#f85149':'#d29922'}
function adjVal(name,v){return ROW_KEYS.includes(name)?v/ROW_DIVISOR:v}

function groupAggAdj(upt,grp,wi){
  let t=0,o=0;
  Object.entries(D[upt][grp]).forEach(([name,arr])=>{t+=adjVal(name,arr[wi].t);o+=adjVal(name,arr[wi].o);});
  return{t,o};
}

function calcProgress(upt){
  const n=WL.length-1, p=Math.max(0,n-1);
  let totT=0,totO=0,rawT=0,rawO=0,rawRow=0,rawRowO=0,prevRawO=0;
  ['G','T','P'].forEach(g=>{
    Object.entries(D[upt][g]).forEach(([name,arr])=>{
      totT+=adjVal(name,arr[n].t); totO+=adjVal(name,arr[n].o);
      rawT+=arr[n].t; rawO+=arr[n].o; prevRawO+=arr[p].o;
      if(ROW_KEYS.includes(name)){rawRow+=arr[n].t;rawRowO+=arr[n].o;}
    });
  });
  return{pct:totT>0?Math.round((1-totO/totT)*100):100,adjT:Math.round(totT),adjO:Math.round(totO),rawT,rawO,rawRow,rawRowO,prevRawO,nonRowT:rawT-rawRow,nonRowO:rawO-rawRowO};
}

function destroyCharts(arr){arr.forEach(c=>{try{c.destroy()}catch(e){}});return[];}

function makeLineChart(canvas, labels, tData, oData, col){
  return new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[
      {label:'Target',data:tData,borderColor:'rgba(88,166,255,0.35)',borderDash:[4,3],borderWidth:1.5,pointRadius:0,tension:0.3,fill:false},
      {label:'Open',data:oData,borderColor:col,backgroundColor:col+'22',borderWidth:2,
       pointRadius:labels.map((_,i)=>i===labels.length-1?5:2),pointBackgroundColor:col,tension:0.3,fill:true}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f2937',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#8b949e',
        callbacks:{label:c=>{const o=c.parsed.y,t=tData[c.dataIndex],p=t>0?Math.round((1-o/t)*100):100;
          return c.dataset.label==='Open'?` Open: ${o.toLocaleString()} — ${p}% selesai`:` Target: ${o.toLocaleString()}`;
        }}
      }},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:8,family:'DM Mono'},color:'#484f58',autoSkip:true,maxTicksLimit:6,maxRotation:45}},
        y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:8,family:'DM Mono'},color:'#484f58',callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}}
      }
    }
  });
}

// ── NAV ──────────────────────────────────────────────────────────────────
function renderNavTabs(){
  document.getElementById('nav-tabs').innerHTML=
    [{key:'rekap',label:'Rekap UIT JBM'},{key:'upt',label:'Per UPT'}]
    .map(t=>`<button class="nav-tab${t.key===activeView?' on':''}" onclick="setView('${t.key}')">${t.label}</button>`).join('');
}
function setView(v){
  activeView=v;
  document.getElementById('view-rekap').style.display=v==='rekap'?'':'none';
  document.getElementById('view-upt').style.display=v==='upt'?'':'none';
  renderAll();
}
function setUpt(u){activeUpt=u;renderUptView();}

// ── REKAP ─────────────────────────────────────────────────────────────────
function renderRekap(){
  _rekapCharts=destroyCharts(_rekapCharts);
  const n=WL.length-1;
  const results=UPTS.map(upt=>({upt,...calcProgress(upt)})).sort((a,b)=>b.pct-a.pct);
  let totalRawT=0,totalRawO=0,totalAdjT=0,totalAdjO=0,totalPrevRawO=0;
  results.forEach(r=>{totalRawT+=r.rawT;totalRawO+=r.rawO;totalAdjT+=r.adjT;totalAdjO+=r.adjO;totalPrevRawO+=r.prevRawO;});
  const totalPct=totalAdjT>0?Math.round((1-totalAdjO/totalAdjT)*100):100;
  const tpc=totalPct>=80?'#3fb950':totalPct>=50?'#d29922':'#f85149';
  const totalDelta=totalPrevRawO-totalRawO;
  const dStr=totalDelta>0?`<span style="color:#3fb950">▼ ${totalDelta.toLocaleString()}</span>`:totalDelta<0?`<span style="color:#f85149">▲ ${Math.abs(totalDelta).toLocaleString()}</span>`:`<span style="color:var(--text3)">—</span>`;

  const uptCards=results.map(r=>{
    const bc=r.pct>=80?'#3fb950':r.pct>=50?'#d29922':'#f85149';
    const d=r.prevRawO-r.rawO;
    const ds=d>0?`<span style="color:#3fb950;font-family:var(--font-m);font-size:10px;margin-left:3px">▼${d.toLocaleString()}</span>`:d<0?`<span style="color:#f85149;font-family:var(--font-m);font-size:10px;margin-left:3px">▲${Math.abs(d).toLocaleString()}</span>`:`<span style="color:var(--text3);font-family:var(--font-m);font-size:10px;margin-left:3px">—</span>`;
    return `<div class="upt-card"><div class="upt-head"><span class="upt-name">${r.upt}</span><span class="upt-pct" style="color:${bc}">${r.pct}%</span></div>
    <div class="upt-bar-bg"><div class="upt-bar-f" style="width:${r.pct}%;background:${bc}"></div></div>
    <div class="upt-stats">
      <div class="upt-stat">Open <span>${r.rawO.toLocaleString()}${ds}</span></div>
      <div class="upt-stat">Target <span>${r.rawT.toLocaleString()}</span></div>
      <div class="upt-stat">Non-ROW <span>${r.nonRowO.toLocaleString()}/${r.nonRowT.toLocaleString()}</span></div>
      <div class="upt-stat">ROW B1 <span>${r.rawRowO.toLocaleString()} pohon</span></div>
    </div></div>`;
  }).join('');

  // Group aggregate panels
  function buildGrpPanel(gKey){
    const gm=GROUP_META[gKey];
    const allSubs=new Set();UPTS.forEach(u=>Object.keys(D[u][gKey]).forEach(k=>allSubs.add(k)));
    const rows=[...allSubs].map(name=>{
      let totT=0,totO=0,has=false;
      UPTS.forEach(u=>{const a=D[u][gKey][name];if(a){totT+=a[n].t;totO+=a[n].o;if(a[n].t>0||a[n].o>0)has=true;}});
      if(!has)return'';
      const p=pct(totO,totT),oc=oColor(totO,totT);
      return `<div class="cat-row"><div class="cat-top"><span class="cat-name">${name}</span><span class="cat-nums" style="color:${oc}">${totO.toLocaleString()}/${totT.toLocaleString()}</span><span class="cat-pct" style="color:${oc}">${p}%</span></div><div class="cat-bar-bg"><div class="cat-bar-f" style="width:${p}%;background:${gm.bar}"></div></div></div>`;
    }).filter(Boolean).join('');
    let gAdjT=0,gAdjO=0;UPTS.forEach(u=>{const a=groupAggAdj(u,gKey,n);gAdjT+=a.t;gAdjO+=a.o;});
    const gp=pct(gAdjO,gAdjT),gc=oColor(gAdjO,gAdjT);
    return `<div class="gpanel"><div class="gpanel-head"><span class="gpanel-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${gKey}</span><span class="gpanel-label">${gm.label.split('–')[1].trim()}</span><span class="gpanel-pct" style="color:${gc}">${gp}%</span></div>${rows||'<div style="font-size:11px;color:var(--text3)">—</div>'}</div>`;
  }

  // Detail charts per group (UPT comparison grouped bar)
  function buildDetailCharts(){
    let html='',chartDefs=[];
    ['G','T','P'].forEach(gKey=>{
      const gm=GROUP_META[gKey];
      const allSubs=new Set();UPTS.forEach(u=>Object.keys(D[u][gKey]).forEach(k=>allSubs.add(k)));
      const active=[...allSubs].filter(name=>UPTS.some(u=>{const a=D[u][gKey][name];return a&&(a[n].t>0||a[n].o>0);}));
      if(!active.length)return;
      const cid='rekap_chart_'+gKey;
      const barH=Math.max(active.length*50+80,160);
      const datasets=UPTS.map(upt=>({
        label:upt,
        data:active.map(name=>{const a=D[upt][gKey][name];return a?a[n].o:0;}),
        targets:active.map(name=>{const a=D[upt][gKey][name];return a?a[n].t:0;}),
        color:UPT_COLORS[upt]
      }));
      const totalPcts=active.map(name=>{let tT=0,tO=0;UPTS.forEach(u=>{const a=D[u][gKey][name];if(a){tT+=a[n].t;tO+=a[n].o;}});return pct(tO,tT);});
      chartDefs.push({cid,active,datasets,totalPcts,barH,gKey});
      const lg=UPTS.map(u=>`<span class="chart-legend-item"><span class="legend-sq" style="background:${UPT_COLORS[u]}"></span>${u}</span>`).join('');
      const mini=active.map((name,i)=>{const p=totalPcts[i];const oc=p===100?'#3fb950':p===0?'#f85149':'#d29922';return`<div><div class="mini-prog-name">${name}</div><div style="display:flex;align-items:center;gap:5px"><div style="flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden"><div style="height:100%;width:${p}%;background:${oc};border-radius:2px"></div></div><span style="font-family:var(--font-m);font-size:9px;color:${oc};min-width:28px;text-align:right">${p}%</span></div></div>`;}).join('');
      html+=`<div class="detail-chart-block"><div class="detail-chart-head"><span class="grp-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${gKey}</span><span style="font-size:12px;color:var(--text2)">${gm.label.split('–')[1].trim()}</span></div>
      <div class="chart-card"><div class="chart-legend">${lg}</div><div style="position:relative;width:100%;height:${barH}px"><canvas id="${cid}"></canvas></div><div class="mini-prog-grid">${mini}</div></div></div>`;
    });
    return {html,chartDefs};
  }

  const {html:detailHtml,chartDefs}=buildDetailCharts();

  document.getElementById('view-rekap').innerHTML=`
    <div class="sec-head"><span class="sec-title">Ringkasan</span><span class="sec-rule"></span><span class="sec-meta">${LAST_UPDATE}</span></div>
    <div class="stat-row">
      <div class="stat-card"><div class="slb">Progress UIT JBM</div><div class="sv" style="color:${tpc}">${totalPct}%</div><div class="ssub">normalisasi ROW B1</div></div>
      <div class="stat-card"><div class="slb">Total Open</div><div class="sv" style="color:#f85149">${totalRawO.toLocaleString()}</div><div class="ssub">${dStr} vs kemarin</div></div>
      <div class="stat-card"><div class="slb">Total Target</div><div class="sv">${totalRawT.toLocaleString()}</div><div class="ssub">awal tahun 2026</div></div>
      <div class="stat-card"><div class="slb">Selesai</div><div class="sv" style="color:#3fb950">${(totalRawT-totalRawO).toLocaleString()}</div><div class="ssub">${Math.round((totalRawT-totalRawO)/totalRawT*100)}% dari target</div></div>
    </div>
    <div class="note-box"><strong>Catatan normalisasi:</strong> ROW B1 (vegetasi/pohon) dibagi ${ROW_DIVISOR} agar bobotnya proporsional. Tanpa normalisasi ROW B1 mendominasi 77–91% total target.</div>
    <div class="sec-head"><span class="sec-title">Status per UPT</span><span class="sec-rule"></span><span class="sec-meta">diurutkan: progress tertinggi</span></div>
    <div class="upt-grid">${uptCards}</div>
    <div class="sec-head"><span class="sec-title">Detail per Kategori</span><span class="sec-rule"></span><span class="sec-meta">Open per UPT</span></div>
    ${detailHtml}
    <div class="sec-head"><span class="sec-title">Agregat G / T / P</span><span class="sec-rule"></span><span class="sec-meta">total 6 UPT</span></div>
    <div class="panels-grid">${buildGrpPanel('G')}${buildGrpPanel('T')}${buildGrpPanel('P')}</div>`;

  setTimeout(()=>{
    chartDefs.forEach(({cid,active,datasets,barH})=>{
      const canvas=document.getElementById(cid);
      if(!canvas)return;
      const chart=new Chart(canvas,{
        type:'bar',
        data:{labels:active,datasets:datasets.map(ds=>({label:ds.label,data:ds.data,backgroundColor:ds.color+'99',borderColor:ds.color,borderWidth:0,borderRadius:3}))},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{backgroundColor:'#1f2937',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#8b949e',
            callbacks:{label:c=>{const ds=datasets.find(d=>d.label===c.dataset.label);const o=c.parsed.x,t=ds?ds.targets[c.dataIndex]:0;return ` ${c.dataset.label}: ${o.toLocaleString()}/${t.toLocaleString()} (${pct(o,t)}%)`;}}}},
          scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{font:{size:9,family:'DM Mono'},color:'#484f58',callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}},y:{grid:{display:false},ticks:{font:{size:9,family:'DM Mono'},color:'#8b949e'}}}}
      });
      _rekapCharts.push(chart);
    });
  },50);
}

// ── PER UPT ──────────────────────────────────────────────────────────────
function renderNavUtabs(){
  document.getElementById('utabs').innerHTML=UPTS.map(u=>`<button class="utab${u===activeUpt?' on':''}" onclick="setUpt('${u}')">${u}</button>`).join('');
}

function renderUptSummary(){
  const n=WL.length-1;
  let totT=0,totO=0,prevO=0;
  ['G','T','P'].forEach(g=>{const c=groupAggAdj(activeUpt,g,n);const pv=groupAggAdj(activeUpt,g,Math.max(0,n-1));totT+=c.t;totO+=c.o;prevO+=pv.o;});
  const prog=pct(totO,totT),pc=prog>=80?'#3fb950':prog>=50?'#d29922':'#f85149';
  const delta=prevO-totO,ds=delta>0?`<span style="color:#3fb950">▼ ${delta.toLocaleString()}</span>`:delta<0?`<span style="color:#f85149">▲ ${Math.abs(delta).toLocaleString()}</span>`:`<span style="color:var(--text3)">—</span>`;
  document.getElementById('srow-upt').innerHTML=`<div class="stat-row" style="margin-bottom:20px">
    <div class="stat-card"><div class="slb">Target</div><div class="sv">${Math.round(totT).toLocaleString()}</div><div class="ssub">normalisasi</div></div>
    <div class="stat-card"><div class="slb">Open</div><div class="sv" style="color:#f85149">${Math.round(totO).toLocaleString()}</div><div class="ssub">${ds} vs kemarin</div></div>
    <div class="stat-card"><div class="slb">Progress</div><div class="sv" style="color:${pc}">${prog}%</div><div class="ssub">${Math.round(totT-totO).toLocaleString()} selesai</div></div>
    <div class="stat-card"><div class="slb">Update</div><div class="sv" style="font-size:14px;padding-top:6px;font-family:var(--font-m)">${LAST_UPDATE}</div><div class="ssub">data terkini</div></div>
  </div>`;
}

function renderUptPanels(){
  const n=WL.length-1;
  document.getElementById('panels').innerHTML=['G','T','P'].map(gKey=>{
    const gm=GROUP_META[gKey];
    const rows=Object.entries(D[activeUpt][gKey]).map(([name,arr])=>{
      const t=arr[n].t,o=arr[n].o;if(!t&&!o)return'';
      const p=pct(o,t),oc=oColor(o,t);
      const d=arr[Math.max(0,n-1)].o-o;
      const ds=d>0?`<span class="delta-tag" style="color:#3fb950">▼${d}</span>`:d<0?`<span class="delta-tag" style="color:#f85149">▲${Math.abs(d)}</span>`:'';
      return `<div class="cat-row"><div class="cat-top"><span class="cat-name">${name}</span><span class="cat-nums" style="color:${oc}">${o.toLocaleString()}/${t.toLocaleString()}${ds}</span><span class="cat-pct" style="color:${oc}">${p}%</span></div><div class="cat-bar-bg"><div class="cat-bar-f" style="width:${p}%;background:${gm.bar}"></div></div></div>`;
    }).filter(Boolean).join('');
    const agg=groupAggAdj(activeUpt,gKey,n),gp=pct(agg.o,agg.t);
    return `<div class="gpanel"><div class="gpanel-head"><span class="gpanel-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${gKey}</span><span class="gpanel-label">${gm.label.split('–')[1].trim()}</span><span class="gpanel-pct" style="color:${oColor(agg.o,agg.t)}">${gp}%</span></div>${rows||'<div style="font-size:11px;color:var(--text3)">—</div>'}</div>`;
  }).join('');
}

function renderUptCharts(){
  _uptCharts=destroyCharts(_uptCharts);
  const n=WL.length-1;
  let sectionsHtml='';
  const chartQueue=[];

  ['G','T','P'].forEach(grp=>{
    const gm=GROUP_META[grp];
    const active=Object.entries(D[activeUpt][grp]).filter(([,arr])=>arr.some(p=>p.t>0||p.o>0));
    if(!active.length)return;

    let cardsHtml='';
    active.forEach(([name,arr],i)=>{
      const col=CAT_COLORS[i%CAT_COLORS.length];
      const isROW=ROW_KEYS.includes(name);
      const cid=`upt_${grp}_${i}`;
      const lastO=arr[n].o,lastT=arr[n].t;
      const p=pct(lastO,lastT),pc=p===100?'#3fb950':p===0?'#f85149':'#d29922';
      const tData=WL.map((_,wi)=>{const v=arr[wi]?arr[wi].t:arr[n].t;return isROW?Math.round(v/ROW_DIVISOR):v;});
      const oData=WL.map((_,wi)=>{const v=arr[wi]?arr[wi].o:arr[n].o;return isROW?Math.round(v/ROW_DIVISOR):v;});
      chartQueue.push({cid,tData,oData,col});
      cardsHtml+=`<div class="cat-chart-card" style="border-top:2px solid ${col}">
        <div class="cat-chart-top">
          <span class="cat-chart-name" style="color:${col}">${name}${isROW?' <span style="font-size:8px;opacity:0.5">÷100</span>':''}</span>
          <span class="cat-chart-pct" style="color:${pc}">${p}%</span>
        </div>
        <div class="cat-chart-wrap"><canvas id="${cid}"></canvas></div>
        <div class="cat-chart-foot">
          <span>open: <span style="color:${col}">${isROW?lastO.toLocaleString()+' pohon':lastO.toLocaleString()}</span></span>
          <span>target: ${arr[0].t.toLocaleString()}${isROW?' pohon':''}</span>
        </div>
      </div>`;
    });

    sectionsHtml+=`<div class="charts-section">
      <div class="charts-section-head">
        <span class="charts-grp-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${grp}</span>
        <span style="font-size:11px;color:var(--text2)">${gm.label.split('–')[1].trim()}</span>
      </div>
      <div class="cat-charts-grid">${cardsHtml}</div>
    </div>`;
  });

  document.getElementById('charts-area').innerHTML=sectionsHtml;

  setTimeout(()=>{
    chartQueue.forEach(({cid,tData,oData,col})=>{
      const canvas=document.getElementById(cid);
      if(!canvas)return;
      _uptCharts.push(makeLineChart(canvas,WL,tData,oData,col));
    });
  },50);
}

function renderUptView(){
  renderNavUtabs();
  renderUptSummary();
  renderUptPanels();
  renderUptCharts();
}

// ── MAIN ──────────────────────────────────────────────────────────────────
function renderAll(){
  renderNavTabs();
  if(activeView==='rekap') renderRekap();
  else renderUptView();
}

document.getElementById('topdate').textContent=LAST_UPDATE;
renderAll();
</script>
</body>
</html>
